name: EduGenZ CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Test Python Syntax
        run: |
          python -m py_compile backend/app.py
          python -m py_compile backend/config.py
          python -m py_compile backend/utils.py

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ghcr.io/irfannuriqbal/edugenz-ai:latest -f docker/Dockerfile .
          docker push ghcr.io/irfannuriqbal/edugenz-ai:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/edugenz-ai
            git pull origin main
            sudo systemctl restart edugenz
            sudo systemctl status edugenz --no-pager

      - name: Deployment Success
        run: echo "Build, Push Image, and Auto Deploy successful"
